apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-gws-policy
  namespace: mcp-google-workspace
  labels:
    app.kubernetes.io/name: mcp-google-workspace
    app.kubernetes.io/component: config
data:
  policy.json: |
    {
      "server": {
        "read_only": false,
        "rate_limit_rpm": 120,
        "max_request_bytes": 16777216
      },
      "services": [
        {
          "name": "drive",
          "folders": [
            { "path": "Projects/current-project", "access": "read-write" }
          ]
        },
        {
          "name": "gmail",
          "denied_methods": ["messages.delete", "messages.trash"]
        },
        {
          "name": "calendar",
          "calendars": [
            { "id": "primary", "access": "read-write" }
          ]
        }
      ]
    }
