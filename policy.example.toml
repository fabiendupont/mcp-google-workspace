# MCP Google Workspace — Policy File
#
# Place this file as `gws-policy.toml` next to your project's .claude/ directory,
# or point to it with --policy <path>.
#
# When no policy file is provided, the server requires --services and exposes
# nothing by default.

# Global defaults — applied to every service unless overridden.
[server]
# Only allow read operations (GET methods) across all services.
read_only = false

# Maximum request body size in bytes (default: 16 MB).
# Protects against oversized payloads.
# max_request_bytes = 16777216

# Rate limit: maximum requests per minute per client IP (HTTP transport only).
# Omit or set to 0 for unlimited.
# rate_limit_rpm = 120

# Allowed HTTP origins (HTTP transport only).
# When empty (default), only localhost/127.0.0.1 is allowed.
# When set, ONLY the listed origins are allowed (localhost is NOT implicit).
# allowed_origins = ["https://internal.corp.com", "https://dashboard.example.com"]

# Path to a credentials JSON file (authorized_user or service_account).
# When set, this takes priority over env vars and gws auth export.
# Generate with: gws auth export --unmasked > /path/to/credentials.json
# credentials_file = "/path/to/credentials.json"

# Per-service configuration. Only services listed here are exposed.
# Everything not listed is denied.

# --- Drive with per-folder permissions ---
# When folders are specified, only those folders are accessible.
# Each folder gets its own access level: read-only or read-write.
#
# Use `id` for folder IDs, or `path` for human-readable paths.
# Paths are resolved to IDs at server startup via the Drive API.
# "My Drive" is optional — "Customers/ACME" and "My Drive/Customers/ACME" are equivalent.
[[services]]
name = "drive"

# By folder ID (no API call needed at startup)
[[services.folders]]
id = "1ABC-shared-references"
access = "read-only"

# By path (resolved once at startup, cached as ID)
[[services.folders]]
path = "Projects/current-project/output"
access = "read-write"

# "My Drive" prefix is also accepted
[[services.folders]]
path = "My Drive/Shared/Templates"
access = "read-only"

# --- Calendar with per-calendar permissions ---
[[services]]
name = "calendar"

[[services.calendars]]
id = "primary"
access = "read-write"

[[services.calendars]]
id = "company-holidays@group.calendar.google.com"
access = "read-only"

# --- Gmail with method denylist ---
[[services]]
name = "gmail"
denied_methods = ["messages.delete", "messages.trash"]

# --- Sheets: full read-only ---
[[services]]
name = "sheets"
read_only = true

# --- Docs: full read-only ---
[[services]]
name = "docs"
read_only = true
